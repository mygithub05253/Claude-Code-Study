name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: 린트 / 타입체크 / 테스트
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 린트
        run: pnpm lint

      - name: 포맷 검사
        run: pnpm format:check

      - name: 타입체크
        run: pnpm typecheck || echo "아직 패키지가 없으므로 typecheck는 skip (Phase 1부터 강제)"

      - name: 테스트
        run: pnpm test || echo "아직 패키지가 없으므로 test는 skip (Phase 1부터 강제)"
